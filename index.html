<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sofiia Chaika — Resume</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:linear-gradient(135deg,#F7FAF8,#EDF3F0,#E4ECE8);font-family:'DM Sans','Segoe UI',sans-serif;color:#1A1A1A}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes dropIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@media print{.no-print{display:none!important}body{background:#fff!important}.resume-card{box-shadow:none!important;margin:0!important;border-radius:0!important}.section{break-inside:avoid}}
.top-bar{display:flex;justify-content:center;gap:12px;padding:20px 16px 12px;flex-wrap:wrap;animation:scaleIn .4s ease}
.dropdown-wrap{position:relative;display:inline-block}
.dropdown-btn{display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:12px;font-size:14px;font-weight:600;background:#fff;border:2px solid #C8DDD5;color:#2D2D2D;cursor:pointer;min-width:170px;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.dropdown-btn:hover{box-shadow:0 4px 16px rgba(74,124,111,.15)}
.dropdown-menu{position:absolute;top:calc(100% + 6px);left:0;right:0;background:#fff;border-radius:12px;border:2px solid #C8DDD5;box-shadow:0 8px 30px rgba(74,124,111,.18);overflow:hidden;z-index:100;animation:dropIn .2s ease;display:none}
.dropdown-menu.open{display:block}
.dropdown-menu button{display:flex;align-items:center;gap:12px;width:100%;padding:12px 16px;font-size:14px;border:none;cursor:pointer;color:#2D2D2D;background:transparent;transition:background .15s;text-align:left}
.dropdown-menu button:hover{background:#F7FAF8}
.dropdown-menu button.active{background:#EDF3F0;font-weight:600}
.flag-img{width:24px;height:16px;object-fit:cover;border-radius:2px;vertical-align:middle;border:1px solid rgba(0,0,0,.08)}
.pdf-btn{display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:12px;font-size:14px;font-weight:600;background:#4A7C6F;border:2px solid #4A7C6F;color:#fff;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(74,124,111,.2)}
.pdf-btn:hover{background:#3D6B5E}
.resume-card{max-width:768px;margin:8px auto 32px;border-radius:16px;overflow:hidden;background:#fff;box-shadow:0 8px 40px rgba(74,124,111,.12),0 1px 3px rgba(0,0,0,.06);animation:scaleIn .4s ease}
.header{padding:24px 20px;background:linear-gradient(135deg,#3D6B5E,#4A7C6F,#5A9485);position:relative;overflow:hidden}
@media(min-width:640px){.header{padding:28px 32px}}
.deco1{position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.06)}
.deco2{position:absolute;bottom:-30px;left:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.04)}
.header-inner{display:flex;align-items:flex-start;gap:20px;position:relative}
.photo{flex-shrink:0;width:110px;height:110px;border-radius:50%;border:3px solid rgba(255,255,255,.45);overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.25)}
.photo img{width:100%;height:100%;object-fit:cover}
.header-info{flex:1;min-width:0}
.header-info h1{font-family:'Playfair Display',Georgia,serif;color:#fff;letter-spacing:.04em;font-size:22px;margin-bottom:2px}
@media(min-width:640px){.header-info h1{font-size:26px}}
.subtitle{color:rgba(255,255,255,.7);margin-bottom:12px;font-size:11px;line-height:1.3}
.info-group{font-size:11px;line-height:1.8;color:rgba(255,255,255,.92)}
.info-group .lbl{color:rgba(255,255,255,.5)}
.info-group a{color:rgba(255,255,255,.95);text-decoration:none;border-bottom:1px dotted rgba(255,255,255,.35)}
.info-group a:hover{border-bottom-color:rgba(255,255,255,.7)}
.info-gap{height:10px}
.copy-btn{background:none;border:none;cursor:pointer;padding:1px 4px;display:inline-flex;align-items:center;vertical-align:middle;margin-left:2px;position:relative}
.copy-btn svg{stroke:rgba(255,255,255,.5)}
.copy-toast{position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:#2D2D2D;color:#fff;font-size:10px;padding:3px 8px;border-radius:6px;white-space:nowrap;animation:fadeSlideUp .2s ease;z-index:10}
.body{padding:24px 20px}
@media(min-width:640px){.body{padding:24px 32px}}
.section{margin-bottom:24px;break-inside:avoid}
.section h2{font-size:13px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#4A7C6F;border-bottom:2px solid #4A7C6F;padding-bottom:8px;margin-bottom:12px}
.about-text{font-size:14px;line-height:1.7;color:#3A3A3A}
.edu-item{margin-bottom:12px;padding-left:16px;border-left:2px solid #D5E5DF}
.edu-item .title{font-size:14px;font-weight:600;color:#2D2D2D}
.edu-item .place{font-size:12px;color:#5A6B63}
.edu-item .date{font-size:12px;color:#7A8B84;font-style:italic}
.exp-item{margin-bottom:16px;padding-left:16px;border-left:2px solid #D5E5DF}
.exp-header{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:4px}
.exp-header .title{font-size:14px;font-weight:600;color:#2D2D2D}
.exp-badge{font-size:10px;padding:2px 8px;border-radius:99px;background:#EDF3F0;color:#4A7C6F}
.exp-period{font-size:12px;color:#7A8B84;font-style:italic;margin-bottom:8px}
.bullet{font-size:12px;padding-left:12px;margin-bottom:4px;color:#3A3A3A}
.bullet .arr{color:#4A7C6F;margin-right:6px}
.lang-bar{margin-bottom:8px}
.lang-bar .top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.lang-bar .name{color:#2D2D2D;font-weight:600}
.lang-bar .lvl{color:#7A8B84}
.lang-bar .track{width:100%;height:8px;border-radius:99px;background:#E8EEEB}
.lang-bar .fill{height:8px;border-radius:99px;background:linear-gradient(90deg,#4A7C6F,#6BA898);transition:width 1s ease}
.skill-tag{display:inline-block;font-size:12px;padding:4px 12px;border-radius:99px;margin:0 8px 8px 0;font-weight:500;background:#EDF3F0;color:#3D6B5E;border:1px solid #C8DDD5}
.interest-tag{display:inline-block;font-size:12px;padding:6px 12px;border-radius:8px;margin:0 8px 8px 0;font-weight:500;background:linear-gradient(135deg,#EDF3F0,#E4ECE8);color:#3D6B5E}
.footer{padding:12px 32px;text-align:center;font-size:12px;background:#F7FAF8;color:#7A8B84;border-top:1px solid #E4ECE8}
</style>
</head>

var curLang="en", menuOpen=false;

function toggleDropdown() {
  menuOpen = !menuOpen;
  document.getElementById("langMenu").classList.toggle("open", menuOpen);
  document.getElementById("langArrow").style.transform = menuOpen ? "rotate(180deg)" : "rotate(0)";
}

document.addEventListener("click", function(e) {
  if (!document.getElementById("langDropdown").contains(e.target)) {
    menuOpen = false;
    document.getElementById("langMenu").classList.remove("open");
    document.getElementById("langArrow").style.transform = "rotate(0)";
  }
});

function copyText(t, btn) {
  navigator.clipboard.writeText(t).then(function() {
    var s = document.createElement("span");
    s.className = "copy-toast";
    s.textContent = D[curLang].copied;
    btn.appendChild(s);
    setTimeout(function() { s.remove(); }, 1500);
  });
}

function switchLang(l) {
  curLang = l;
  menuOpen = false;
  document.getElementById("langMenu").classList.remove("open");
  document.getElementById("langArrow").style.transform = "rotate(0)";
  document.getElementById("langFlag").src = flagSrcs[l];
  document.getElementById("langLabel").textContent = labels[l];

  document.querySelectorAll("#langMenu button").forEach(function(b) {
    b.classList.toggle("active", b.dataset.lang === l);
    var c = b.querySelector(".ck");
    if (c) c.remove();
    if (b.dataset.lang === l) {
      var s = document.createElement("span");
      s.className = "ck";
      s.style.cssText = "margin-left:auto;color:#4A7C6F";
      s.textContent = "\u2713";
      b.appendChild(s);
    }
  });

  var d = D[l];
  document.getElementById("hName").textContent = d.name;
  document.getElementById("hSubtitle").textContent = d.subtitle;
  document.getElementById("lBorn").textContent = d.bornL;
  document.getElementById("vBorn").textContent = d.bornV;
  document.getElementById("lNat").textContent = d.natL;
  document.getElementById("vNat").textContent = d.natV;
  document.getElementById("lEmail").textContent = d.emailL;
  document.getElementById("lPhone").textContent = d.phoneL;
  document.getElementById("pdfLabel").textContent = d.pdf;
  document.getElementById("tAbout").textContent = d.about.toUpperCase();
  document.getElementById("cAbout").textContent = d.aboutT;
  document.getElementById("tEdu").textContent = d.edu.toUpperCase();
  document.getElementById("cEdu").innerHTML = d.eduD.map(function(e) {
    return '<div class="edu-item"><div class="title">' + e.t + '</div><div class="place">' + e.p + '</div><div class="date">' + e.d + '</div></div>';
  }).join("");
  document.getElementById("tExp").textContent = d.exp.toUpperCase();
  document.getElementById("cExp").innerHTML = d.expD.map(function(e) {
    return '<div class="exp-item"><div class="exp-header"><span class="title">' + e.t + '</span><span class="exp-badge">' + e.ty + '</span></div><div class="exp-period">' + e.per + '</div>' + e.b.map(function(b) { return '<div class="bullet"><span class="arr">\u25b8</span>' + b + '</div>'; }).join("") + '</div>';
  }).join("");
  document.getElementById("tLang").textContent = d.lang.toUpperCase();
  document.getElementById("cLang").innerHTML = d.langD.map(function(x) {
    return '<div class="lang-bar"><div class="top"><span class="name">' + x.n + '</span><span class="lvl">' + x.l + '</span></div><div class="track"><div class="fill" style="width:' + x.p + '%"></div></div></div>';
  }).join("");
  document.getElementById("tDig").textContent = d.dig.toUpperCase();
  document.getElementById("cDig").innerHTML = d.digD.map(function(s) {
    return '<div class="bullet"><span class="arr">\u25b8</span>' + s + '</div>';
  }).join("");
  document.getElementById("tSkills").textContent = d.skills.toUpperCase();
  document.getElementById("cSkills").innerHTML = d.skillsD.map(function(s) {
    return '<span class="skill-tag">' + s + '</span>';
  }).join("");
  document.getElementById("tInt").textContent = d.int.toUpperCase();
  document.getElementById("cInt").innerHTML = d.intD.map(function(s) {
    return '<span class="interest-tag">' + s + '</span>';
  }).join("");
  document.getElementById("footer").textContent = "Sofiia Chaika \u2014 " + d.foot + " \u00a9 2026";
  document.title = "Sofiia Chaika \u2014 " + d.foot;
}

switchLang("en");
